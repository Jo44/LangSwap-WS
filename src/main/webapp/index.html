<!DOCTYPE html>
<html lang="fr">
<!-- Head -->
<head>
<meta charset="UTF-8">
<title>LangSwap-WS</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<!-- CSS -->
<link rel="stylesheet" href="./css/index.css" />
</head>
<!-- Body -->
<body>
	<!-- Page Wrapper -->
	<div class="page-wrapper">
		<!-- Header -->
		<header>
			<div class="header-ornament top"></div>
			<h1>LangSwap</h1>
			<h2>Obfuscated Translations</h2>
			<div class="header-ornament bottom"></div>
		</header>
		<!-- Main -->
		<main>
			<!-- Toolbar -->
			<div class="toolbar">
				<p id="status">Loading ...</p>
				<button id="download-csv" disabled>Download CSV</button>
			</div>
			<!-- Table Wrapper -->
			<div class="table-wrapper">
				<table>
					<thead>
						<tr>
							<th class="sortable" data-sort-key="actionId" aria-sort="none">Action ID</th>
							<th class="sortable" data-sort-key="obfuscatedName" aria-sort="none">Obfuscated Name</th>
							<th class="sortable" data-sort-key="languageId" aria-sort="none">Language</th>
							<th class="sortable" data-sort-key="deobfuscatedName" aria-sort="none">De-obfuscated Name</th>
							<th class="sortable" data-sort-key="creationDate" aria-sort="none">Upload</th>
							<th class="sortable" data-sort-key="characterName" aria-sort="none">By</th>
						</tr>
					</thead>
					<!-- Data -->
					<tbody id="translations-body"></tbody>
				</table>
			</div>
		</main>
		<!-- Footer -->
		<footer>
			<p>LangSwap WebService &mdash; Collected data from LangSwap plugin</p>
		</footer>
	</div>
	<!-- JavaScript -->
	<script src="./js/index.js"></script>
</body>
</html>
